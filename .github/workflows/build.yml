# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: actions/package-lock.json
    - name: Install dependencies
      run: npm ci
      working-directory: actions
    
    - name: Run tests
      run: npm run test:ci
      working-directory: actions
      
    - name: Build
      run: npm run build
      working-directory: actions

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    # 1️⃣ Clonar el repo
    - uses: actions/checkout@v4

    # 3️⃣ Configurar credenciales AWS
    - uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 4️⃣ Preparar paquete de deploy
    - name: Prepare deployment bundle
      run: |
        mkdir deploy
        cp -r actions/dist/* deploy/
        cp appspec.yml deploy/
        cp -r scripts deploy/
        cd deploy
        zip -r ../deploy.zip .

    # 5️⃣ Desplegar con CodeDeploy directamente (sin S3)
    - name: Deploy to AWS CodeDeploy
      run: |
        aws deploy create-deployment \
          --application-name angular-app \
          --deployment-group-name angular-app-dg \
          --deployment-config-name CodeDeployDefault.OneAtATime \
          --description "Deploy desde GitHub Actions" \
          --file-exists-behavior OVERWRITE \
          --zip-file fileb://deploy.zip

